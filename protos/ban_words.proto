syntax = "proto3";

package settings;

service BanWordsService {
    rpc RetrieveBanWords(RetrieveBanWordsRequest) returns (BanWords) {}
}

message RetrieveBanWordsRequest {
    int64 author_id = 1;
    string updated_at = 2;
}

message BanWords {
    int64 id = 1;
    bool is_active = 2;
    string words = 3;
    string created_at = 4;
    string updated_at = 5;
}
