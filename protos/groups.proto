syntax = "proto3";

package groups;

import "settings.proto";

service AlertSettingsGroupController {
    rpc Retrieve(AlertSettingsGroupRetrieveRequest) returns (AlertSettingsGroup) {}
    rpc ListByIds(AlertSettingsGroupsListByAuthorIdRequest) returns (AlertSettingsGroupsListByAuthorIdResponse) {}
}

message AlertSettingsGroup {
    int64 id = 1;
    string title = 2;
    string updated_at = 3;
    int64 user = 4;
    repeated settings.AlertSetting alert_settings = 5;
}

message AlertSettingsGroupRetrieveRequest {
    int64 author_id = 1;
    int64 group_id = 2;
    string updated_at = 3;
}

message AlertSettingsGroupsListByAuthorIdRequest {
    int64 author_id = 1;
    repeated int64 group_ids = 2;
    string updated_at = 3;
}

message AlertSettingsGroupsListByAuthorIdResponse {
    repeated AlertSettingsGroup groups = 1;
}