syntax = "proto3";

package groups;

import "protos/settings.proto";

service AlertSettingsGroupController {
    rpc Retrieve(AlertSettingsGroupRetrieveRequest) returns (AlertSettingsGroup) {}
}

message AlertSettingsGroup {
    int64 id = 1;
    string title = 2;
    string updated_at = 3;
    int64 user = 4;
    repeated settings.AlertSetting alert_settings = 5;
}

message AlertSettingsGroupRetrieveRequest {
    int64 author_id = 1;
    int64 group_id = 2;
    string updated_at = 3;
}
