syntax = "proto3";

package settings;

service StatisticWidgetSettingsService {
    rpc RetrieveStatisticWidgetSettings(RetrieveStatisticWidgetSettingsRequest) returns (StatisticWidgetSettings) {}
}

message RetrieveStatisticWidgetSettingsRequest {
    int64 author_id = 1;
    int64 setting_id = 2;
}

message StatisticWidgetSettings {
    int64 id = 1;
    int64 user = 2;
    string type = 3;
    string title = 4;
    string period = 5;
    int32 elements_count = 6;
    string view_type = 7;
    string string_template = 8;
    string created_at = 9;
    string updated_at = 10;
    string font = 11;
    string color = 12;
    string style = 13;
    string font_align = 14;
    int32 font_size = 15;
    string shadow_color = 16;
    int32 shadow_horizontal_offset = 17;
    int32 shadow_vertical_offset = 18;
    int32 shadow_blur = 19;
    string contour_color = 20;
    int32 contour_width = 21;
}
