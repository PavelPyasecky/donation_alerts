name: Publish Image

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: image-publish-main
  cancel-in-progress: true

jobs:
  publish:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      REGISTRY: ${{ vars.CONTAINER_REGISTRY }}
      IMAGE_NAME: ${{ vars.CONTAINER_IMAGE_NAME }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate registry settings
        run: |
          test -n "$REGISTRY" || (echo "vars.CONTAINER_REGISTRY is required" && exit 1)
          test -n "$IMAGE_NAME" || (echo "vars.CONTAINER_IMAGE_NAME is required" && exit 1)
          test -n "${{ secrets.CONTAINER_REGISTRY_USERNAME }}" || (echo "secrets.CONTAINER_REGISTRY_USERNAME is required" && exit 1)
          test -n "${{ secrets.CONTAINER_REGISTRY_PASSWORD }}" || (echo "secrets.CONTAINER_REGISTRY_PASSWORD is required" && exit 1)

      - name: Login to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.CONTAINER_REGISTRY_USERNAME }}
          password: ${{ secrets.CONTAINER_REGISTRY_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
