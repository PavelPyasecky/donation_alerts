services:
  caddy:
    image: caddy:2.8-alpine
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - rabbitmq

  api:
    image: ${APP_IMAGE:-donation-alerts:latest}
    pull_policy: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    labels:
      - com.centurylinklabs.watchtower.enable=true
    depends_on:
      rabbitmq:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  watchtower:
    image: containrrr/watchtower:1.7.1
    restart: unless-stopped
    command: --interval 30 --cleanup --rolling-restart --label-enable
    environment:
      - DOCKER_API_VERSION=${DOCKER_API_VERSION}
      - REPO_USER=${CONTAINER_REGISTRY_USERNAME}
      - REPO_PASS=${CONTAINER_REGISTRY_PASSWORD}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  caddy_data:
  caddy_config:
